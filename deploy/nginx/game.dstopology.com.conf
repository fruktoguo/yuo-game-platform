server {
    listen 80;
    listen [::]:80;
    server_name game.dstopology.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name game.dstopology.com;

    ssl_certificate     /etc/ssl/cloudflare/token.dstopology.com.pem;
    ssl_certificate_key /etc/ssl/cloudflare/token.dstopology.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 2m;
    include /etc/nginx/snippets/cloudflare-allow.conf;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_buffering off;

    location = /life {
        return 308 /life/;
    }

    location /life/ {
        proxy_pass http://127.0.0.1:3101/;
    }

    location = /billiards {
        return 308 /billiards/;
    }

    location /billiards/ {
        proxy_pass http://127.0.0.1:3102/;
    }

    location = /snake {
        return 308 /snake/;
    }

    location /snake/ {
        proxy_pass http://127.0.0.1:3103/;
    }

    location = /foundry {
        return 308 /foundry/;
    }

    location /foundry/ {
        proxy_pass http://127.0.0.1:3104/;
    }

    location / {
        proxy_pass http://127.0.0.1:3100;
    }
}
