<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PROJECT GSS0 设计控制台</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Bahnschrift, "Microsoft YaHei UI", Arial, sans-serif;
      background: #0b0e10;
      color: #f4f6f5;
      letter-spacing: 0;
      --ink: #0b0e10;
      --panel: #14191c;
      --panel-2: #1b2226;
      --line: #354047;
      --muted: #9ba7ac;
      --yellow: #f3c600;
      --cyan: #24c7d9;
      --green: #54d59b;
      --orange: #ff9f43;
      --red: #ff5c62;
    }

    * { box-sizing: border-box; }
    body { margin: 0; min-width: 320px; background: var(--ink); }
    button, input, select { font: inherit; letter-spacing: 0; }
    button, input, select { border-radius: 3px; }
    button { cursor: pointer; }
    button:disabled { cursor: not-allowed; opacity: 0.42; }
    :focus-visible { outline: 2px solid var(--cyan); outline-offset: 2px; }

    .topbar {
      position: sticky;
      z-index: 20;
      top: 0;
      display: grid;
      grid-template-columns: minmax(240px, 1fr) auto;
      gap: 20px;
      align-items: center;
      min-height: 76px;
      padding: 14px clamp(18px, 3vw, 42px);
      border-bottom: 1px solid var(--line);
      background: rgba(11, 14, 16, 0.96);
      backdrop-filter: blur(14px);
    }

    .brand { display: flex; min-width: 0; align-items: center; gap: 14px; }
    .brand-mark { width: 8px; height: 42px; flex: 0 0 auto; background: var(--yellow); box-shadow: 8px 0 0 var(--cyan); }
    .brand span { display: block; color: var(--yellow); font-size: 10px; font-weight: 900; }
    .brand h1 { margin: 3px 0 0; font-size: 21px; line-height: 1; }
    .file-state { margin-left: 8px; padding-left: 12px; border-left: 1px solid var(--line); color: var(--muted); font-size: 11px; font-weight: 800; }
    .file-state.is-dirty { color: var(--orange); }
    .file-state.is-saved { color: var(--green); }

    .commands { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; }
    .command {
      min-height: 38px;
      padding: 0 14px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: #f4f6f5;
      font-size: 12px;
      font-weight: 900;
    }
    .command:hover:not(:disabled) { border-color: var(--cyan); }
    .command.primary { border-color: var(--yellow); background: var(--yellow); color: #080a0b; }
    .detail-toggle {
      display: flex;
      min-height: 38px;
      align-items: center;
      gap: 10px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 3px;
      background: var(--panel-2);
      color: #f4f6f5;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }
    .detail-toggle input { position: absolute; width: 1px; height: 1px; opacity: 0; }
    .detail-toggle i {
      position: relative;
      width: 34px;
      height: 18px;
      flex: 0 0 auto;
      border: 1px solid #657178;
      border-radius: 9px;
      background: #0f1315;
      transition: border-color 140ms ease, background 140ms ease;
    }
    .detail-toggle i::after {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #9ba7ac;
      content: "";
      transition: transform 140ms ease, background 140ms ease;
    }
    .detail-toggle input:checked + i { border-color: var(--yellow); background: rgba(243, 198, 0, 0.2); }
    .detail-toggle input:checked + i::after { background: var(--yellow); transform: translateX(16px); }
    .detail-toggle input:focus-visible + i { outline: 2px solid var(--cyan); outline-offset: 2px; }
    .scale-control {
      display: grid;
      min-height: 38px;
      grid-template-columns: auto 92px 42px;
      gap: 9px;
      align-items: center;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 3px;
      background: var(--panel-2);
      color: #f4f6f5;
      font-size: 12px;
      font-weight: 900;
    }
    .scale-control input { width: 92px; accent-color: var(--cyan); }
    .scale-control output { color: var(--cyan); text-align: right; font-variant-numeric: tabular-nums; }

    .workspace { display: grid; grid-template-columns: 190px minmax(0, 1fr); min-height: calc(100vh - 76px); }
    .sidebar { position: sticky; top: 76px; height: calc(100vh - 76px); padding: 28px 18px; border-right: 1px solid var(--line); background: #0f1315; }
    .sidebar-label { margin: 0 8px 12px; color: var(--muted); font-size: 9px; font-weight: 900; }
    .tab {
      display: grid;
      width: 100%;
      min-height: 44px;
      grid-template-columns: 25px 1fr;
      align-items: center;
      margin-bottom: 6px;
      padding: 0 11px;
      border: 1px solid transparent;
      background: transparent;
      color: #c7ced1;
      text-align: left;
      font-size: 12px;
      font-weight: 900;
    }
    .tab b { color: var(--muted); font-size: 10px; }
    .tab.is-active { border-color: var(--line); border-left: 4px solid var(--yellow); background: var(--panel); color: #fff; }

    .content { width: min(1240px, 100%); padding: 34px clamp(18px, 4vw, 56px) 70px; }
    .view[hidden] { display: none; }
    .view-head { display: flex; align-items: end; justify-content: space-between; gap: 20px; margin-bottom: 24px; }
    .view-head span { color: var(--cyan); font-size: 10px; font-weight: 900; }
    .view-head h2 { margin: 5px 0 0; font-size: 26px; }
    .view-count { color: var(--muted); font-size: 12px; font-weight: 800; }

    .parameter-groups { display: grid; gap: 30px; }
    .parameter-group { border-top: 3px solid var(--line); }
    .parameter-group h3 { margin: 0; padding: 14px 0 12px; font-size: 14px; }
    .parameter-row {
      display: grid;
      grid-template-columns: minmax(190px, 0.8fr) minmax(220px, 1fr) 116px 60px;
      gap: 18px;
      align-items: center;
      min-height: 72px;
      padding: 11px 0;
      border-top: 1px solid #252d31;
    }
    .parameter-copy strong { display: block; font-size: 13px; }
    .parameter-copy span { display: block; margin-top: 4px; color: var(--muted); font-size: 10px; line-height: 1.45; }
    input[type="range"] { width: 100%; accent-color: var(--yellow); }
    .number-input, .filter-input, select {
      min-height: 38px;
      border: 1px solid var(--line);
      background: #0f1315;
      color: #fff;
    }
    .number-input { width: 100%; padding: 0 10px; text-align: right; font-variant-numeric: tabular-nums; }
    .unit { color: var(--muted); font-size: 11px; font-weight: 800; }

    .module-toolbar { display: grid; grid-template-columns: minmax(220px, 1fr) 170px 170px; gap: 10px; margin-bottom: 18px; }
    .filter-input, select { width: 100%; padding: 0 12px; }
    .module-list { border-top: 3px solid var(--line); }
    .module-row {
      display: grid;
      grid-template-columns: 42px minmax(155px, 0.46fr) minmax(260px, 1fr) minmax(330px, auto);
      gap: 16px;
      align-items: center;
      min-height: 104px;
      padding: 15px 0;
      border-bottom: 1px solid #293237;
    }
    .swatch { display: grid; width: 34px; height: 34px; place-items: center; border: 1px solid currentColor; color: var(--module-color); }
    .swatch::after { width: 13px; height: 13px; background: currentColor; content: ""; transform: rotate(45deg); }
    .module-name strong { display: block; font-size: 14px; }
    .module-name span { display: block; margin-top: 5px; color: var(--module-color); font-size: 10px; font-weight: 900; }
    .module-desc { color: #bdc6c9; font-size: 11px; line-height: 1.58; }
    .module-desc small { display: block; margin-top: 5px; color: var(--muted); font-weight: 800; }
    .status-control { display: grid; grid-template-columns: repeat(4, minmax(64px, 1fr)); border: 1px solid var(--line); }
    .status-control button { min-height: 34px; padding: 0 7px; border: 0; border-right: 1px solid var(--line); background: #101518; color: #9ba7ac; font-size: 10px; font-weight: 900; }
    .status-control button:last-child { border-right: 0; }
    .status-control button.is-active[data-state="normal"] { background: var(--green); color: #07110c; }
    .status-control button.is-active[data-state="tune"] { background: var(--yellow); color: #101000; }
    .status-control button.is-active[data-state="rework"] { background: var(--orange); color: #160b02; }
    .status-control button.is-active[data-state="disabled"] { background: var(--red); color: #fff; }
    .empty { padding: 48px 0; color: var(--muted); text-align: center; }

    @media (max-width: 980px) {
      .topbar { grid-template-columns: 1fr; }
      .commands { justify-content: flex-start; }
      .workspace { grid-template-columns: 1fr; }
      .sidebar { position: sticky; top: 128px; z-index: 15; display: flex; width: 100%; height: auto; gap: 8px; padding: 10px 18px; border-right: 0; border-bottom: 1px solid var(--line); }
      .sidebar-label { display: none; }
      .tab { width: auto; min-width: 132px; margin: 0; }
      .module-row { grid-template-columns: 38px minmax(140px, 0.5fr) 1fr; }
      .status-control { grid-column: 2 / -1; }
    }

    @media (max-width: 660px) {
      .topbar { position: relative; padding: 14px; }
      .brand { flex-wrap: wrap; }
      .file-state { display: block; width: 100%; margin: 8px 0 0; padding: 7px 0 0; border-top: 1px solid var(--line); border-left: 0; }
      .workspace { min-height: 0; }
      .sidebar { top: 0; overflow-x: auto; padding: 8px 14px; }
      .content { padding: 25px 14px 50px; }
      .view-head { align-items: flex-start; flex-direction: column; }
      .parameter-row { grid-template-columns: 1fr 88px 44px; gap: 10px; padding: 15px 0; }
      .parameter-copy { grid-column: 1 / -1; }
      .parameter-row input[type="range"] { grid-column: 1 / 2; }
      .module-toolbar { grid-template-columns: 1fr 1fr; }
      .filter-input { grid-column: 1 / -1; }
      .module-row { grid-template-columns: 34px 1fr; }
      .module-desc, .status-control { grid-column: 1 / -1; }
      .status-control { grid-template-columns: repeat(2, 1fr); }
      .status-control button:nth-child(2) { border-right: 0; }
      .status-control button:nth-child(-n + 2) { border-bottom: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <i class="brand-mark" aria-hidden="true"></i>
      <div><span>PROJECT GSS0 / LOCAL DESIGN</span><h1>设计控制台</h1></div>
      <output id="file-state" class="file-state">designer-config.js · 正在加载</output>
    </div>
    <div class="commands">
      <label class="scale-control">
        <span>界面缩放</span>
        <input id="interface-scale" type="range" min="80" max="160" step="10" value="100">
        <output id="interface-scale-output" for="interface-scale">100%</output>
      </label>
      <label class="detail-toggle" title="切换机体图鉴中的简略与完整描述">
        <span>机体详细描述</span>
        <input id="description-detail" type="checkbox" role="switch">
        <i aria-hidden="true"></i>
      </label>
      <button id="open-config" class="command primary" type="button">授权自动保存</button>
      <button id="reload-config" class="command" type="button">重新加载</button>
    </div>
  </header>

  <main class="workspace">
    <nav class="sidebar" aria-label="设计视图">
      <p class="sidebar-label">CONTROL VIEWS</p>
      <button class="tab is-active" type="button" data-view="balance"><b>01</b><span>参数列表</span></button>
      <button class="tab" type="button" data-view="modules"><b>02</b><span>机体图鉴</span></button>
    </nav>

    <div class="content">
      <section id="balance-view" class="view">
        <header class="view-head"><div><span>RUNTIME BALANCE</span><h2>游戏参数</h2></div><output id="parameter-count" class="view-count"></output></header>
        <div id="parameter-groups" class="parameter-groups"></div>
      </section>

      <section id="modules-view" class="view" hidden>
        <header class="view-head"><div><span>MODULE ARCHIVE</span><h2>机体状态图鉴</h2></div><output id="module-count" class="view-count"></output></header>
        <div class="module-toolbar">
          <input id="module-search" class="filter-input" type="search" placeholder="搜索名称或 ID" aria-label="搜索机体">
          <select id="category-filter" aria-label="筛选分类"><option value="all">全部分类</option><option>输出</option><option>防御</option><option>辅助</option><option>恢复</option></select>
          <select id="status-filter" aria-label="筛选状态"><option value="all">全部状态</option><option value="normal">正常</option><option value="tune">需调数值</option><option value="rework">需大改</option><option value="disabled">禁用</option></select>
        </div>
        <div id="module-list" class="module-list"></div>
      </section>
    </div>
  </main>

  <script src="designer-config.js"></script>
  <script>
    (() => {
      "use strict";

      const PARAMETER_DEFINITIONS = [
        { key: "playerBaseSpeed", group: "玩家", label: "玩家基础速度", hint: "升级与机体加速前的每秒移动格数", min: 1, max: 12, step: 0.1, unit: "格/秒" },
        { key: "playerSpeedPerLevel", group: "玩家", label: "玩家每级速度成长", hint: "每级附加的基础速度倍率；0.1 表示每级提高 10%", min: 0, max: 0.5, step: 0.005, unit: "倍率/级" },
        { key: "playerTurnRate", group: "玩家", label: "玩家基础转向", hint: "不含涡轮节加成的基础转向速度", min: 0.5, max: 12, step: 0.05, unit: "弧度/秒" },
        { key: "upgradeInvulnerabilityDuration", group: "玩家", label: "升级后无敌时间", hint: "选择机体并恢复移动后的全身保护时间", min: 0, max: 10, step: 0.05, unit: "秒" },
        { key: "respawnLocatorConvergeDuration", group: "表现", label: "复活定位收束时长", hint: "双层外框从屏幕外缩小到玩家蛇头所需的时间", min: 0.1, max: 10, step: 0.1, unit: "秒" },
        { key: "respawnLocatorFadeDuration", group: "表现", label: "复活定位淡出时长", hint: "外框到达玩家蛇头后逐渐变淡消失的时间", min: 0.1, max: 20, step: 0.1, unit: "秒" },
        { key: "headAttackInterval", group: "玩家", label: "蛇头攻击间隔", hint: "受攻击间隔倍率和超频增幅节影响前的间隔", min: 0.05, max: 30, step: 0.05, unit: "秒" },
        { key: "headTargetRange", group: "玩家", label: "蛇头索敌距离", hint: "蛇头自动武器发现敌人的像素半径", min: 50, max: 2000, step: 10, unit: "px" },
        { key: "enemyBaseSpeed", group: "敌人", label: "敌人基础速度", hint: "敌人生命长度加速前的每秒移动格数", min: 0.5, max: 12, step: 0.1, unit: "格/秒" },
        { key: "enemySpeedPerInitialHealth", group: "敌人", label: "每点初始生命速度成长", hint: "每点初始生命附加的速度倍率；0.02 表示提高 2%", min: 0, max: 0.5, step: 0.005, unit: "倍率/点" },
        { key: "enemyTurnRateMin", group: "敌人", label: "敌人最低转向", hint: "每次转向采用的随机速度下界", min: 0.1, max: 10, step: 0.05, unit: "弧度/秒" },
        { key: "enemyTurnRateMax", group: "敌人", label: "敌人最高转向", hint: "每次转向采用的随机速度上界", min: 0.1, max: 12, step: 0.05, unit: "弧度/秒" },
        { key: "enemyBaseHealth", group: "敌人", label: "敌人基础生命", hint: "包含蛇头，0 级敌人的总生命", min: 1, max: 100, step: 1, unit: "点" },
        { key: "enemyHealthPerLevelMin", group: "敌人", label: "每级生命成长下界", hint: "按对应玩家等级随机计算的最低成长", min: 0, max: 20, step: 0.1, unit: "点/级" },
        { key: "enemyHealthPerLevelMax", group: "敌人", label: "每级生命成长上界", hint: "按对应玩家等级随机计算的最高成长", min: 0, max: 30, step: 0.1, unit: "点/级" },
        { key: "waveInterval", group: "波次", label: "基础波次间隔", hint: "未受增压信标和场上单位数量影响前的间隔", min: 0.5, max: 120, step: 0.1, unit: "秒" },
        { key: "waveRatePerLevel", group: "波次", label: "每级波次加速", hint: "最高玩家每级附加的波次倒计时倍率", min: 0, max: 1, step: 0.01, unit: "倍率/级" },
        { key: "wavePopulationSoftCap", group: "波次", label: "场上单位软上限", hint: "球与敌人总数超过该值后开始放缓波次", min: 0, max: 1000, step: 1, unit: "个" },
        { key: "wavePopulationPenaltyPerUnit", group: "波次", label: "单位超量减速", hint: "每个超出软上限的单位增加的波次间隔惩罚", min: 0, max: 2, step: 0.01, unit: "倍率/个" },
        { key: "foodsPerPlayerPerWave", group: "波次", label: "每人每波球数", hint: "每个存活玩家在新波次贡献的普通球数量", min: 0, max: 20, step: 1, unit: "枚" },
        { key: "enemiesPerPlayerPerWave", group: "波次", label: "每人每波敌人数", hint: "每个存活玩家在新波次贡献的敌蛇数量", min: 0, max: 12, step: 1, unit: "条" },
        { key: "enemySpawnWarning", group: "波次", label: "敌人出生预警", hint: "预警轮廓出现到敌人实体生成的时间", min: 0, max: 10, step: 0.05, unit: "秒" },
        { key: "projectileSpeedScale", group: "战斗", label: "全局子弹速度倍率", hint: "作用于所有以速度参数发射的投射物", min: 0.1, max: 10, step: 0.05, unit: "倍" },
        { key: "projectileRangeMultiplier", group: "战斗", label: "子弹射程补偿倍率", hint: "有索敌距离限制的子弹在发射后获得的实际飞行距离倍率", min: 0.1, max: 10, step: 0.05, unit: "倍" },
        { key: "attackIntervalScale", group: "战斗", label: "全局攻击间隔倍率", hint: "头部与大部分定时输出技能共用的冷却时间倍率", min: 0.1, max: 10, step: 0.05, unit: "倍" },
        { key: "moduleTargetRange", group: "战斗", label: "机体索敌距离", hint: "大部分需要目标的机体共用的索敌半径", min: 50, max: 2000, step: 10, unit: "px" },
        { key: "arenaAreaPerLevel", group: "场地", label: "每级场地面积成长", hint: "按场上最高玩家等级增加的场地面积倍率", min: 0, max: 0.5, step: 0.005, unit: "倍率/级" },
        { key: "arenaResizeRate", group: "场地", label: "场地缩放速度", hint: "场地面积目标变化后的平滑追随速度", min: 0.1, max: 10, step: 0.1, unit: "速率" },
        { key: "maxRenderFps", group: "性能", label: "最高绘制帧率", hint: "只限制 Canvas 和界面动效绘制，不降低逻辑与网络输入频率", min: 30, max: 240, step: 1, unit: "FPS" },
        { key: "maxRenderDpr", group: "性能", label: "最高渲染像素倍率", hint: "限制 Canvas 内部像素密度；界面文字仍由浏览器原生清晰绘制", min: 1, max: 2, step: 0.05, unit: "DPR" },
        { key: "networkPlayerStateHz", group: "性能", label: "玩家状态同步频率", hint: "手动玩家每秒向服务器发送完整蛇身状态的次数", min: 5, max: 60, step: 1, unit: "Hz" },
        { key: "networkCollisionClaimCooldownMs", group: "性能", label: "碰撞事件防重复间隔", hint: "同一目标的可靠碰撞事件再次发送前等待的时间", min: 100, max: 2000, step: 50, unit: "ms" },
        { key: "networkInterpolationMinMs", group: "性能", label: "联机插值最短延迟", hint: "远端实体平滑播放时保留的最短快照缓冲", min: 40, max: 300, step: 5, unit: "ms" },
        { key: "networkInterpolationMaxMs", group: "性能", label: "联机插值最长延迟", hint: "网络抖动时远端实体允许增加到的最大快照缓冲", min: 40, max: 400, step: 5, unit: "ms" },
        { key: "networkCollisionHistoryMs", group: "性能", label: "头撞回溯历史", hint: "服务器为玩家头撞裁决保留位置历史的时长", min: 200, max: 3000, step: 50, unit: "ms" },

        parameterGroups: document.querySelector("#parameter-groups"), parameterCount: document.querySelector("#parameter-count"), moduleList: document.querySelector("#module-list"), moduleCount: document.querySelector("#module-count"),
        search: document.querySelector("#module-search"), category: document.querySelector("#category-filter"), status: document.querySelector("#status-filter"), descriptionDetail: document.querySelector("#description-detail"),
        interfaceScale: document.querySelector("#interface-scale"), interfaceScaleOutput: document.querySelector("#interface-scale-output")
      };

      let fileHandle = null;
      let savedConfig = normalizeConfig(globalThis.GSS0_DESIGNER_CONFIG);
      let draft = structuredClone(savedConfig);
      let savedSnapshot = JSON.stringify(draft);
      let autoSaveTimer = 0;
      let saveInFlight = false;
      let saveQueued = false;
      let writePermissionReady = false;
      let helperReady = false;
      let detailedDescriptions = false;
      try { detailedDescriptions = localStorage.getItem("gss0-detailed-descriptions") === "1"; } catch {}
      const filePickerSupported = typeof window.showOpenFilePicker === "function";

      function normalizeConfig(value) {
        const config = { schemaVersion: 2, balance: {}, moduleStates: {} };
        for (const definition of PARAMETER_DEFINITIONS) {
          const candidate = Number(value?.balance?.[definition.key]);
          config.balance[definition.key] = Number.isFinite(candidate) ? Math.max(definition.min, Math.min(definition.max, candidate)) : definition.min;
        }
        for (const module of MODULES) {
          const state = value?.moduleStates?.[module.id];
          config.moduleStates[module.id] = Object.hasOwn(STATUS_LABELS, state) ? state : "normal";
        }
        return config;
      }

      function parseConfig(text) {
        const marker = "globalThis.GSS0_DESIGNER_CONFIG =";
        const markerIndex = text.indexOf(marker);
        if (markerIndex < 0) throw new Error("不是 PROJECT GSS0 设计配置文件");
        const start = text.indexOf("{", markerIndex + marker.length);
        const end = text.lastIndexOf("}");
        if (start < 0 || end <= start) throw new Error("配置内容不完整");
        const parsed = JSON.parse(text.slice(start, end + 1));
        if (parsed?.schemaVersion !== 2) throw new Error("配置版本无效，需要 schemaVersion 2");
        return normalizeConfig(parsed);
      }

      function serializeConfig(config = draft) {
        return `globalThis.GSS0_DESIGNER_CONFIG = ${JSON.stringify(config, null, 2)};\n`;
      }

      function isDirty() { return JSON.stringify(draft) !== savedSnapshot; }
      function setFileState(message, state = "") {
        ui.fileState.textContent = message;
        ui.fileState.className = `file-state${state ? ` is-${state}` : ""}`;
      }
      function refreshDirtyState() {
        if (helperMode) {
          ui.open.hidden = true;
          if (!helperReady) setFileState(`${CONFIG_FILE_NAME} · 正在连接本地启动器`, "dirty");
          else if (saveInFlight) setFileState(`${CONFIG_FILE_NAME} · 正在自动保存`, "dirty");
          else if (isDirty()) setFileState(`${CONFIG_FILE_NAME} · 等待自动保存`, "dirty");
          else setFileState(`${CONFIG_FILE_NAME} · 已自动同步`, "saved");
          return;
        }
        ui.open.hidden = false;
        if (!filePickerSupported) setFileState(`${CONFIG_FILE_NAME} · 已自动加载 · 当前浏览器不支持写回文件`, "dirty");
        else if (fileHandle && !writePermissionReady) setFileState(`${CONFIG_FILE_NAME} · 已自动加载 · 点击恢复自动保存`, "dirty");
        else if (saveInFlight) setFileState(`${CONFIG_FILE_NAME} · 正在自动保存`, "dirty");
        else if (isDirty()) setFileState(fileHandle ? `${CONFIG_FILE_NAME} · 等待自动保存` : `${CONFIG_FILE_NAME} · 修改尚未写入`, "dirty");
        else setFileState(fileHandle ? `${CONFIG_FILE_NAME} · 已自动同步` : `${CONFIG_FILE_NAME} · 已自动加载 · 授权后可自动保存`, fileHandle ? "saved" : "");
        ui.open.textContent = fileHandle ? (writePermissionReady ? "更换绑定" : "恢复自动保存") : "授权自动保存";
      }

      function openHandleDatabase() {
        return new Promise((resolve, reject) => {
          const request = indexedDB.open(HANDLE_DATABASE, 1);
          request.onupgradeneeded = () => request.result.createObjectStore(HANDLE_STORE);
          request.onsuccess = () => resolve(request.result);
          request.onerror = () => reject(request.error || new Error("无法保存配置文件授权"));
        });
      }

      async function storedFileHandle() {
        const database = await openHandleDatabase();
        return new Promise((resolve, reject) => {
          const request = database.transaction(HANDLE_STORE).objectStore(HANDLE_STORE).get(HANDLE_KEY);
          request.onsuccess = () => resolve(request.result || null);
          request.onerror = () => reject(request.error || new Error("无法读取配置文件授权"));
          request.transaction.oncomplete = () => database.close();
        });
      }

      async function rememberFileHandle(handle) {
        const database = await openHandleDatabase();
        await new Promise((resolve, reject) => {
          const transaction = database.transaction(HANDLE_STORE, "readwrite");
          transaction.objectStore(HANDLE_STORE).put(handle, HANDLE_KEY);
          transaction.oncomplete = resolve;
          transaction.onerror = () => reject(transaction.error || new Error("无法保存配置文件授权"));
        });
        database.close();
      }

      async function hasWritePermission(handle, allowPrompt) {
        if (await handle.queryPermission({ mode: "readwrite" }) === "granted") return true;
        return allowPrompt && await handle.requestPermission({ mode: "readwrite" }) === "granted";
      }

      async function readBoundConfig(handle) {
        const file = await handle.getFile();
        const next = parseConfig(await file.text());
        fileHandle = handle;
        writePermissionReady = true;
        draft = next;
        savedConfig = structuredClone(next);
        savedSnapshot = JSON.stringify(next);
        renderParameters();
        renderModules();
        refreshDirtyState();
      }

      async function requestHelper(options = {}) {
        const response = await fetch("/api/config", {
          ...options,
          cache: "no-store",
          headers: { ...(options.headers || {}), "X-GSS0-Editor-Token": helperToken }
        });
        if (!response.ok) throw new Error((await response.text()) || `本地启动器请求失败 (${response.status})`);
        return response;
      }

      async function readHelperConfig() {
        const response = await requestHelper();
        const next = parseConfig(await response.text());
        helperReady = true;
        draft = next;
        savedConfig = structuredClone(next);
        savedSnapshot = JSON.stringify(next);
        renderParameters();
        renderModules();
        refreshDirtyState();
      }

      function autoSaveReady() {
        return helperMode ? helperReady : Boolean(fileHandle && writePermissionReady);
      }

      function scheduleAutoSave() {
        refreshDirtyState();
        window.clearTimeout(autoSaveTimer);
        if (!autoSaveReady() || !isDirty()) return;
        autoSaveTimer = window.setTimeout(() => void flushAutoSave(), AUTO_SAVE_DELAY_MS);
      }

      async function flushAutoSave() {
        window.clearTimeout(autoSaveTimer);
        autoSaveTimer = 0;
        if (!autoSaveReady() || !isDirty()) return;
        if (saveInFlight) {
          saveQueued = true;
          return;
        }
        const enabledCount = MODULES.reduce((count, module) => count + Number(draft.moduleStates[module.id] !== "disabled"), 0);
        if (enabledCount === 0) {
          setFileState("至少保留一个未禁用机体", "dirty");
          return;
        }
        saveInFlight = true;
        refreshDirtyState();
        const persistedSnapshot = JSON.stringify(draft);
        let savedSuccessfully = false;
        try {
          if (helperMode) {
            await requestHelper({
              method: "PUT",
              headers: { "Content-Type": "text/javascript; charset=utf-8" },
              body: serializeConfig(JSON.parse(persistedSnapshot))
            });
          } else {
            if (!await hasWritePermission(fileHandle, false)) throw new Error("写入权限已失效，请重新授权");
            const writable = await fileHandle.createWritable();
            await writable.write(serializeConfig(JSON.parse(persistedSnapshot)));
            await writable.close();
          }
          savedConfig = JSON.parse(persistedSnapshot);
          savedSnapshot = persistedSnapshot;
          savedSuccessfully = true;
        } catch (error) {
          if (!helperMode) writePermissionReady = false;
          setFileState(error instanceof Error ? error.message : "自动保存失败", "dirty");
        } finally {
          saveInFlight = false;
          const shouldSaveAgain = saveQueued || (savedSuccessfully && isDirty());
          saveQueued = false;
          if (savedSuccessfully || !helperMode) refreshDirtyState();
          if (shouldSaveAgain && autoSaveReady()) scheduleAutoSave();
        }
      }

      function renderParameters() {
        const groups = [...new Set(PARAMETER_DEFINITIONS.map((item) => item.group))];
        ui.parameterGroups.replaceChildren(...groups.map((groupName) => {
          const group = document.createElement("section");
          group.className = "parameter-group";
          const title = document.createElement("h3");
          title.textContent = groupName;
          group.append(title, ...PARAMETER_DEFINITIONS.filter((item) => item.group === groupName).map((definition) => {
            const row = document.createElement("div");
            row.className = "parameter-row";
            const copy = document.createElement("div");
            copy.className = "parameter-copy";
            copy.innerHTML = `<strong>${definition.label}</strong><span>${definition.hint}</span>`;
            const range = document.createElement("input");
            range.type = "range";
            range.min = definition.min;
            range.max = definition.max;
            range.step = definition.step;
            range.value = draft.balance[definition.key];
            range.setAttribute("aria-label", definition.label);
            const number = document.createElement("input");
            number.type = "number";
            number.className = "number-input";
            number.min = definition.min;
            number.max = definition.max;
            number.step = definition.step;
            number.value = draft.balance[definition.key];
            number.setAttribute("aria-label", `${definition.label}数值`);
            const update = (value) => {
              const parsed = Number(value);
              if (!Number.isFinite(parsed)) return;
              const next = Math.max(definition.min, Math.min(definition.max, parsed));
              draft.balance[definition.key] = next;
              range.value = next;
              number.value = next;
              scheduleAutoSave();
            };
            range.addEventListener("input", () => update(range.value));
            number.addEventListener("change", () => update(number.value));
            const unit = document.createElement("span");
            unit.className = "unit";
            unit.textContent = definition.unit;
            row.append(copy, range, number, unit);
            return row;
          }));
          return group;
        }));
        ui.parameterCount.textContent = `${PARAMETER_DEFINITIONS.length} 项参数`;
      }

      function renderModules() {
        const query = ui.search.value.trim().toLocaleLowerCase("zh-CN");
        const modules = MODULES.filter((module) => {
          const state = draft.moduleStates[module.id];
          return (ui.category.value === "all" || module.category === ui.category.value)
            && (ui.status.value === "all" || state === ui.status.value)
            && (!query || `${module.name} ${module.id} ${module.desc} ${SHORT_MODULE_DESCRIPTIONS[module.id] || ""}`.toLocaleLowerCase("zh-CN").includes(query));
        });
        if (modules.length === 0) {
          const empty = document.createElement("div");
          empty.className = "empty";
          empty.textContent = "没有符合筛选条件的机体";
          ui.moduleList.replaceChildren(empty);
        } else {
          ui.moduleList.replaceChildren(...modules.map((module) => {
            const row = document.createElement("article");
            row.className = "module-row";
            row.style.setProperty("--module-color", module.color);
            const swatch = document.createElement("span");
            swatch.className = "swatch";
            swatch.setAttribute("aria-hidden", "true");
            const name = document.createElement("div");
            name.className = "module-name";
            name.innerHTML = `<strong>${module.name}</strong><span>${module.category} / ${module.id}</span>`;
            const description = document.createElement("div");
            description.className = "module-desc";
            description.textContent = detailedDescriptions ? module.desc : SHORT_MODULE_DESCRIPTIONS[module.id] || module.desc;
            if (detailedDescriptions) {
              const cooldown = document.createElement("small");
              cooldown.textContent = `冷却 · ${module.cooldown}`;
              description.append(cooldown);
            }
            const control = document.createElement("div");
            control.className = "status-control";
            control.setAttribute("role", "group");
            control.setAttribute("aria-label", `${module.name}状态`);
            for (const [state, label] of Object.entries(STATUS_LABELS)) {
              const button = document.createElement("button");
              button.type = "button";
              button.dataset.state = state;
              button.classList.toggle("is-active", draft.moduleStates[module.id] === state);
              button.textContent = label;
              button.addEventListener("click", () => {
                draft.moduleStates[module.id] = state;
                renderModules();
                scheduleAutoSave();
              });
              control.append(button);
            }
            row.append(swatch, name, description, control);
            return row;
          }));
        }
        const disabledCount = MODULES.filter((module) => draft.moduleStates[module.id] === "disabled").length;
        ui.moduleCount.textContent = `${modules.length}/${MODULES.length} · 禁用 ${disabledCount}`;
      }

      async function openConfig() {
        try {
          const pendingDraft = isDirty() ? structuredClone(draft) : null;
          if (fileHandle && !writePermissionReady) {
            if (!await hasWritePermission(fileHandle, true)) throw new Error("没有文件写入权限");
            await readBoundConfig(fileHandle);
            if (pendingDraft) {
              draft = pendingDraft;
              renderParameters();
              renderModules();
              scheduleAutoSave();
            }
            return;
          }
          const [handle] = await window.showOpenFilePicker({ id: "gss0-designer-config", multiple: false, types: [{ description: "GSS0 设计配置", accept: { "text/javascript": [".js"] } }] });
          if (handle.name !== CONFIG_FILE_NAME) throw new Error(`请选择 ${CONFIG_FILE_NAME}`);
          if (!await hasWritePermission(handle, true)) throw new Error("没有文件写入权限");
          await rememberFileHandle(handle);
          await readBoundConfig(handle);
          if (pendingDraft) {
            draft = pendingDraft;
            renderParameters();
            renderModules();
            scheduleAutoSave();
          }
        } catch (error) {
          if (error?.name !== "AbortError") setFileState(error instanceof Error ? error.message : "读取配置失败", "dirty");
        }
      }

      async function reloadConfig() {
        try {
          window.clearTimeout(autoSaveTimer);
          if (helperMode) await readHelperConfig();
          else if (fileHandle) await readBoundConfig(fileHandle);
          else {
            draft = normalizeConfig(globalThis.GSS0_DESIGNER_CONFIG);
            savedConfig = structuredClone(draft);
            savedSnapshot = JSON.stringify(draft);
            renderParameters();
            renderModules();
          }
          refreshDirtyState();
        } catch (error) {
          setFileState(error instanceof Error ? error.message : "重新读取配置失败", "dirty");
        }
      }

      async function restoreConfigBinding() {
        try {
          const handle = await storedFileHandle();
          if (!handle || handle.kind !== "file" || handle.name !== CONFIG_FILE_NAME) return;
          fileHandle = handle;
          if (!await hasWritePermission(handle, false)) {
            writePermissionReady = false;
            refreshDirtyState();
            return;
          }
          await readBoundConfig(handle);
        } catch {
          setFileState(`${CONFIG_FILE_NAME} · 已自动加载 · 授权后可自动保存`, "");
        }
      }

      ui.tabs.forEach((tab) => tab.addEventListener("click", () => {
        ui.tabs.forEach((item) => item.classList.toggle("is-active", item === tab));
        ui.balanceView.hidden = tab.dataset.view !== "balance";
        ui.modulesView.hidden = tab.dataset.view !== "modules";
      }));
      ui.search.addEventListener("input", renderModules);
      ui.category.addEventListener("change", renderModules);
      ui.status.addEventListener("change", renderModules);
      ui.descriptionDetail.addEventListener("change", () => {
        detailedDescriptions = ui.descriptionDetail.checked;
        try { localStorage.setItem("gss0-detailed-descriptions", detailedDescriptions ? "1" : "0"); } catch {}
        renderModules();
      });
      ui.interfaceScale.addEventListener("input", () => {
        const value = Math.max(80, Math.min(160, Number(ui.interfaceScale.value) || 100));
        document.documentElement.style.zoom = String(value / 100);
        ui.interfaceScaleOutput.value = `${value}%`;
        try { localStorage.setItem("gss0-editor-interface-scale", String(value)); } catch {}
      });
      ui.open.addEventListener("click", openConfig);
      ui.reload.addEventListener("click", () => void reloadConfig());
      window.addEventListener("keydown", (event) => {
        if ((event.ctrlKey || event.metaKey) && event.key.toLowerCase() === "s") {
          event.preventDefault();
          if (helperMode || fileHandle) void flushAutoSave();
          else void openConfig();
        }
      });
      window.addEventListener("beforeunload", (event) => {
        if (!isDirty()) return;
        event.preventDefault();
        event.returnValue = "";
      });

      if (!helperMode && !filePickerSupported) {
        ui.open.disabled = true;
        setFileState(`${CONFIG_FILE_NAME} · 已自动加载 · 当前浏览器不支持写回文件`, "dirty");
      }
      ui.descriptionDetail.checked = detailedDescriptions;
      let storedInterfaceScale = 100;
      try { storedInterfaceScale = Math.max(80, Math.min(160, Number(localStorage.getItem("gss0-editor-interface-scale")) || 100)); } catch {}
      ui.interfaceScale.value = String(storedInterfaceScale);
      ui.interfaceScale.dispatchEvent(new Event("input"));
      renderParameters();
      renderModules();
      refreshDirtyState();
      if (helperMode) void readHelperConfig().catch((error) => setFileState(error instanceof Error ? error.message : "无法连接本地启动器", "dirty"));
      else if (filePickerSupported) void restoreConfigBinding();
    })();
  </script>
</body>
</html>
